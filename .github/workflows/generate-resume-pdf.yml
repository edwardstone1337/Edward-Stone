name: Generate Resume PDF

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'resume.html'
      - 'assets/css/dev-tokens.css'
      - 'assets/css/dev-styles.css'

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wait for GitHub Pages deployment
        run: sleep 60

      - name: Generate PDF from live URL
        uses: misaelnieto/web_to_pdf_action@master
        with:
          webPageURL: https://edwardstone.design/resume.html
          outputFile: ./files/Edward Stone Resume.pdf
          usePuppeteer: true
          pdfOptions: '{"format": "A4", "margin": {"top": "15mm", "right": "15mm", "bottom": "15mm", "left": "15mm"}, "printBackground": true}'

      - name: Check if PDF changed
        id: check_changes
        run: |
          git diff --quiet "files/Edward Stone Resume.pdf" && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated PDF
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "files/Edward Stone Resume.pdf"
          git commit -m "Auto-generate resume PDF [skip ci]"
          git push
