name: Generate Resume PDF

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'resume.html'
      - 'assets/css/dev-tokens.css'
      - 'assets/css/dev-styles.css'
      - 'assets/js/dev-projects/resume-lightbox.js'
      - 'assets/js/dev-projects/resume-download.js'

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wait for GitHub Pages deployment
        run: sleep 60

      - name: Generate PDF from live URL
        uses: imbhargav5/puppeteer-pdf-action@master
        with:
          url: https://edwardstone.design/resume.html?print=1
          output-file-path: ./files/Edward Stone Resume.pdf

      - name: Check if PDF changed
        id: check_changes
        run: |
          git diff --quiet "files/Edward Stone Resume.pdf" && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated PDF
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "files/Edward Stone Resume.pdf"
          git commit -m "Auto-generate resume PDF [skip ci]"
          git push
