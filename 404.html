<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404, Edward Stone</title>
    <link rel="icon" href="assets/images/Logo.svg" type="image/svg+xml">
    <meta name="robots" content="noindex">

    <script src="/assets/js/env.js"></script>
    <script src="/assets/js/third-party.js"></script>

    <!-- Design system -->
    <link rel="stylesheet" href="assets/css/dev-tokens.css">
    <link rel="stylesheet" href="assets/css/dev-styles.css">

    <script>document.documentElement.setAttribute('data-theme','light')</script>
  </head>
  <body>
    <div id="nav-container"></div>
    <script type="module">
      import { initNav } from './assets/js/dev-projects/nav-component.js';
      import { initBannerTicker } from './assets/js/dev-projects/banner-ticker.js';
      initNav();
      initBannerTicker({ text: 'Currently open to new opportunities', separator: '✦' });
    </script>
    <div class="dp-404-page">
      <div class="dp-404-glow" aria-hidden="true"></div>
      <main class="dp-404-content">
        <h1 class="dp-404-code dp-gradient-text">404</h1>
        <h2 class="dp-404-title">This page doesn't exist</h2>
        <p class="dp-404-body">The page you're looking for has moved or never existed. Let's get you back on track.</p>
        <div class="dp-404-actions">
          <a href="/" class="dp-btn dp-btn-primary">Go home</a>
          <button type="button" class="dp-btn dp-btn-secondary dp-404-snake-btn" onclick="typeof SnakeGame !== 'undefined' && SnakeGame.open()" aria-label="Play Snake game">Play Snake instead</button>
        </div>
      </main>
    </div>
    <script>
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        document.documentElement.classList.remove('dp-no-transition');
      });
    });
    </script>
  </body>
</html>
